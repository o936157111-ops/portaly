<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生活・簡居・生活 | 總入口</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; margin: 0; padding: 20px; text-align: center; background-color: #f9f9f9; }
        .container { max-width: 400px; margin: 0 auto; }
        
        .card-container { 
            background-color: #FCFCFF; 
            border-radius: 24px;       
            border: 1px solid #F0F0F0; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15); 
            overflow: hidden; 
            padding: 40px 25px;
        }
        
        .logo-img { width: 95%; height: auto; display: block; margin: 0 auto 20px auto; }
        .content-section h1 { margin: 10px 0 10px 0; font-size: 1.4em; color: #333; }
        .slogan { line-height: 1.6; color: #666; font-size: 0.9em; margin-bottom: 30px; }
        
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 55px;
            background-color: #f4f4f9;
            color: #333;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1em;
            border: 2px solid #dcdcdc; 
            transition: all 0.2s ease;
        }
        
        .btn:hover {
            background-color: #e8e8f0;
            border-color: #999;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card-container">
            <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhpplybxkZauJQWUOn9OWSx4fqUNgwoxpGXCuovmbLZMKRRh6LSY-nxcOHvfbRtCnP43rluEF1DtoO4T_7Xrl7U_tmbyn4mdN0em7q4DMw3euMtaflcW3EeXl-1trm2MFlhaE4o7HgZ5I4TUVaxOR0eHPdmqwV_Nq_tlSMHGhiooq68AHhpA7lz6C58U8O5/s16000-rw/logo.gif" alt="Logo" class="logo-img">
            
            <div class="content-section">
                <h1>生活・簡居・生活</h1>
                <div class="slogan">
                    <p>書.咖啡.小日子.零碎日常<br>
                    用瞬間記錄永恆，拿片刻鋪滿人生；<br>
                    在角落翻開記憶，把點滴串成一生。<br>
                    漫無目的，恣意生活。</p>
                </div>
            </div>

            <div class="button-group">
                <a href="https://portaly.cc/myezlife" class="btn">Portaly</a>
                <a href="https://myeztravellife.blogspot.com" class="btn">Blogger</a>
                <a href="https://www.pinterest.com/myezstore/pins/" class="btn">Pinterest</a>
                <a href="https://www.youtube.com/@myezlife" class="btn">YouTube</a>
                <a href="https://www.instagram.com/?hl=zh-tw" class="btn">Instagram</a>
                <a href="https://play.google.com/books" class="btn">生活書房</a>
                <a href="https://ebook.nlpi.edu.tw" class="btn">電子圖書館</a>
